<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WildDex</title>

<style>
/* --- Badge Styles --- */
.badge {
  display: inline-block;
  margin: 6px;
  padding: 10px 16px;
  border-radius: 12px;
  font-weight: bold;
  color: white;
  background: linear-gradient(45deg, #ff6b6b, #ff9a6b);
  box-shadow: 0 4px 6px rgba(0,0,0,0.2);
  cursor: default;
  transition: transform 0.3s, box-shadow 0.3s;
  font-size: 14px;
}
.badge:hover {
  transform: scale(1.1);
  box-shadow: 0 6px 10px rgba(0,0,0,0.3);
}
@keyframes badgePop {
  0% { transform: scale(0.5); opacity: 0; }
  70% { transform: scale(1.2); opacity: 1; }
  100% { transform: scale(1); }
}
.badge.animate { animation: badgePop 0.5s ease-out; }
.badge-world { background: linear-gradient(45deg, #4e9af1, #1c6ef2); }
.badge-element { background: linear-gradient(45deg, #f1d94e, #f2b91c); }
.badge-research { background: linear-gradient(45deg, #4ef182, #1cf25b); }
.badge-rare { background: linear-gradient(45deg, #d94ef1, #a21cf2); }
.badge-legendary { background: linear-gradient(45deg, #ffd700, #ffa500); }

/* --- General Page Styles --- */
body {
  font-family: Verdana, sans-serif;
  background: #aaf0c6;
  margin: 0;
  text-align: center;
}
h1 { margin-top: 15px; }
.tabs {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin: 10px;
}
.tab {
  padding: 8px 14px;
  border-radius: 10px;
  background: #ddd;
  cursor: pointer;
}
.tab.active { background: #bbb; }
.page { display: none; }
.page.active { display: block; }
.grid {
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  justify-content: center;
  padding: 20px;
}

/* --- Card Styles --- */
.card {
  width: 220px;
  height: 340px;
  border-radius: 16px;
  overflow: hidden;
  position: relative;
  border: 2px solid rgba(0,0,0,.2);
  transition: .2s;
  color: #111;
  cursor: pointer;
}
.card:hover { transform: scale(1.03); }
.card-header {
  display: flex;
  justify-content: space-between;
  padding: 6px 8px;
  font-weight: bold;
  font-size: 14px;
}
.image-container {
  width: 100%;
  height: 160px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: white;
  border-bottom: 2px solid rgba(0,0,0,.1);
  overflow: hidden;
  position: relative;
}
.image-container img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.card-body {
  padding: 8px;
  position: relative;
  z-index: 2;
}
.scientific {
  font-style: italic;
  font-size: 13px;
  opacity: .9;
  margin-bottom: 6px;
}
.stats {
  display: flex;
  justify-content: space-between;
  margin-top: 6px;
  font-size: 14px;
}
.footer {
  display: flex;
  justify-content: space-between;
  margin-top: 6px;
  font-size: 18px;
}
.card-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
  pointer-events: none;
  border-radius: inherit;
}

/* --- Rarity Glow --- */
.card.common { box-shadow: none; }
.card.uncommon { box-shadow: 0 0 10px rgba(0,200,255,.4); }
.card.rare { box-shadow: 0 0 10px rgba(180,0,255,.6); }
.card.legendary {
  box-shadow: 0 0 18px rgba(255,215,0,.9), 0 0 30px rgba(255,215,0,.6), 0 0 45px rgba(255,215,0,.3);
  animation: legendPulse 3s infinite alternate;
}
@keyframes legendPulse {
  from { filter: brightness(1); }
  to { filter: brightness(1.15); }
}

/* --- Element Colors --- */
.card.fire { background: linear-gradient(#ffe5d0,#631010); }
.card.water { background: linear-gradient(#dff4ff,#c8eaff); }
.card.grass { background: linear-gradient(#1e3a1e,#2a4d2a); }
.card.ice { background: linear-gradient(#eaffff,#dff6ff); }
.card.flying { background: linear-gradient(#f0f0ff,#e5e5ff); }
.card.dark { background: linear-gradient(#ccc,#676c73); }
.card.poison { background: linear-gradient(#f0d0ff,#e0b0ff); }
.card.bug { background: linear-gradient(#e0f5b0,#dee053); }
.card.electric { background: linear-gradient(#fff6b0,#ffe066); }

/* --- Modal Styles --- */
.modal {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,.6);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 999;
}
.modal-content {
  background: white;
  padding: 20px;
  border-radius: 16px;
  max-width: 420px;
  width: 90%;
  max-height: 80vh;
  overflow-y: auto;
  text-align: center;
}
.modal img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-radius: 10px;
  margin-bottom: 10px;
}
.close {
  float: right;
  cursor: pointer;
  font-weight: bold;
  font-size: 18px;
}
/* Modal additional info */
#modalHabitat, #modalDate {
  font-size: 14px;
  font-style: italic;
  color: #555;
  margin-top: 4px;
}
</style>
</head>
<body>

<!-- Modal -->
<div id="animalModal" class="modal" onclick="closeModal(event)">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">✖</span>
    <h2 id="modalName"></h2>
    <img id="modalImg">
    <p id="modalScientific"></p>
    <p id="modalMove"></p>
    <p id="modalStats"></p>
    <p id="modalType"></p>
    <p id="modalContinent"></p>
    <p id="modalHabitat"></p>
    <p id="modalDate"></p>
    <button onclick="releaseAnimal()" style="margin-top:10px;padding:8px 14px;border-radius:8px;border:none;background:#ff6b6b;color:white;cursor:pointer;">Release</button>
  </div>
</div>

<h1>WildDex</h1>

<!-- Tabs -->
<div class="tabs">
  <div class="tab active" onclick="openPage('log', event)">Log</div>
  <div class="tab" onclick="openPage('catches', event)">Catches</div>
  <div class="tab" onclick="openPage('badges', event)">Badges</div>
</div>

<!-- Pages -->
<div id="log" class="page active">
  <input id="animalInput" list="animals" placeholder="Log animal" onkeydown="if(event.key==='Enter') logAnimal()">
  <datalist id="animals"></datalist>
  <button onclick="logAnimal()">Log</button>
  <p id="logMessage" style="height:20px;font-weight:bold;"></p>
</div>

<div id="catches" class="page">
  <div class="controls">
    <input id="searchBox" placeholder="Search animals" oninput="renderCollection()">
    <select id="filterElement" onchange="renderCollection()">
      <option value="all">All Elements</option>
      <option value="fire">Fire</option>
      <option value="water">Water</option>
      <option value="grass">Grass</option>
      <option value="ice">Ice</option>
      <option value="flying">Flying</option>
      <option value="dark">Dark</option>
      <option value="poison">Poison</option>
      <option value="bug">Bug</option>
      <option value="electric">Electric</option>
    </select>
  </div>
  <div id="collection" class="grid"></div>
</div>

<div id="badges" class="page">
  <div id="badgeArea"></div>
</div>

<script>
// --- Data & Icons ---
const typeIcons={fire:"🔥", water:"💧", grass:"🌿", ice:"❄️", flying:"🕊️", dark:"🌑", poison:"☣️", bug:"🐛", electric:"⚡"};
const habitatIcons={forest:"🌲", grassland:"🌾", mountain:"⛰️", river:"🏞️", coastal:"🌊", urban:"🏙️", wetland:"🦆"};
const continentIcons={Africa:"🌍", Europe:"🌍", Asia:"🌏", NorthAmerica:"🌎", SouthAmerica:"🌎", Australia:"🦘", Antarctica:"🧊"};

// Your animal array here (unchanged for brevity)
const animals = [ /* ... same as before ... */ ];

// Populate datalist
const datalist = document.getElementById("animals");
animals.forEach(a => { let o = document.createElement("option"); o.value = a.name; datalist.appendChild(o); });

let logged = JSON.parse(localStorage.getItem("wilddex_logged")) || [];
let currentAnimal = null;
const imageCache = {};

// --- Functions ---
function logAnimal() {
  let input = document.getElementById("animalInput");
  let name = input.value.trim();
  let animal = animals.find(a => a.name === name);
  let message = document.getElementById("logMessage");

  if(!animal) { message.textContent="Animal not found."; message.style.color="red"; return; }
  if(logged.some(a => a.name === animal.name)) { message.textContent="You've already logged this animal."; message.style.color="orange"; return; }

  let newAnimal = { ...animal, recordedAt: new Date().toISOString() };
  logged.push(newAnimal);
  localStorage.setItem("wilddex_logged", JSON.stringify(logged));

  message.textContent = "New animal logged!"; message.style.color="green";
  input.value=""; input.focus();

  renderCollection();
  updateBadges();
}

async function getImage(name) {
  if(imageCache[name]) return imageCache[name];
  try {
    let url = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(name)}`;
    let res = await fetch(url);
    let data = await res.json();
    let src = data.thumbnail ? data.thumbnail.source : "";
    imageCache[name] = src;
    return src;
  } catch { return ""; }
}

async function renderCollection() {
  let area = document.getElementById("collection");
  area.innerHTML = "";
  let search = document.getElementById("searchBox").value.toLowerCase();
  let filter = document.getElementById("filterElement").value;

  for(let a of logged) {
    if(search && !a.name.toLowerCase().includes(search)) continue;
    if(filter !== "all" && a.type !== filter) continue;
    let img = await getImage(a.name);
    let card = document.createElement("div");
    card.onclick = () => openAnimal(a,img);
    card.className = `card ${a.type} ${a.rarity}`;
    if(a.type2) card.dataset.type2 = a.type2;

    card.innerHTML = `
      <div class="card-header">
        <span>${a.name}</span>
        <span>HP ${a.atk + a.def}</span>
      </div>
      <div class="image-container">
        <img src="${img}" alt="${a.name}">
      </div>
      <div class="card-body">
        <div class="card-overlay"></div>
        <div class="scientific">${a.scientific}</div>
        <div><b>${a.move}</b></div>
        <div class="stats">
          <span>ATK ${a.atk}</span>
          <span>DEF ${a.def}</span>
        </div>
        <div class="footer">
          <span>${typeIcons[a.type]}${a.type2 ? ` ${typeIcons[a.type2]}` : ""}</span>
          <span>${continentIcons[a.continent]}</span>
        </div>
      </div>
    `;
    area.appendChild(card);
  }
}

function updateBadges() {
  const badgeArea = document.getElementById("badgeArea");
  badgeArea.innerHTML = "";

  const continents = [...new Set(logged.map(a => a.continent))];
  const elements = [...new Set(logged.map(a => a.type))];
  const rareCount = logged.filter(a => a.rarity === "rare" || a.rarity === "legendary").length;
  const dualTypes = logged.filter(a => a.type2).length;
  const legendaryCount = logged.filter(a => a.rarity === "legendary").length;

  const createBadge = (text, title, extraClass="") => {
    const b = document.createElement("div");
    b.className = `badge ${extraClass} animate`;
    b.textContent = text;
    b.title = title;
    badgeArea.appendChild(b);
  };

  if (continents.length >= 5) createBadge("🌏 World Explorer", "Collected animals from 5+ continents!", "badge-world");
  else if (continents.length >= 3) createBadge("🌍 Explorer Badge", `Collected animals from 3+ continents. ${5 - continents.length} more to World Explorer!`, "badge-world");

  if (elements.length >= 6) createBadge("⚡ Element Master", "Caught 6+ elements!", "badge-element");
  else if (elements.length >= 3) createBadge("⚡ Elementalist Badge", `Caught 3+ elements. ${6 - elements.length} more to Element Master!`, "badge-element");

  if (logged.length >= 10) createBadge("📘 Field Researcher", "Logged 10+ animals!", "badge-research");
  else if (logged.length >= 5) createBadge("📖 Junior Researcher", `Logged 5+ animals. ${10 - logged.length} more to Field Researcher!`, "badge-research");

  if (rareCount >= 5) createBadge("💎 Elite Collector", "Collected 5+ rare or legendary animals!", "badge-rare");
  else if (rareCount >= 3) createBadge("💎 Collector Badge", `Collected 3+ rare or legendary animals. ${5 - rareCount} more to Elite Collector!`, "badge-rare");

  if (dualTypes >= 3) createBadge("🔗 Dual-Type Explorer", "Caught 3+ dual-type animals!");

  if (legendaryCount >= 1) createBadge("🌟 Legendary Hunter", `Caught ${legendaryCount} legendary animal(s)!`, "badge-legendary");
}

function openPage(id, event){
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  event.target.classList.add("active");
}

function openAnimal(a,img) {
  currentAnimal = a;
  document.getElementById("modalName").textContent = a.name;
  document.getElementById("modalImg").src = img;
  document.getElementById("modalScientific").textContent = "Scientific: " + a.scientific;
  document.getElementById("modalMove").textContent = "Move: " + a.move;
  document.getElementById("modalStats").textContent = `ATK ${a.atk} | DEF ${a.def} | HP ${a.atk+a.def}`;
  document.getElementById("modalType").textContent = `Type: ${a.type}${a.type2?" / "+a.type2:""}`;
  document.getElementById("modalContinent").textContent = "Continent: " + a.continent;
  document.getElementById("modalHabitat").textContent = a.habitat ? "Habitat: " + a.habitat : "Habitat: Unknown";
  document.getElementById("modalDate").textContent = a.recordedAt ? "Recorded: " + new Date(a.recordedAt).toLocaleString() : "Recorded: Unknown";

  document.getElementById("animalModal").style.display = "flex";
}

function closeModal(e){
  if(!e || e.target.id==="animalModal" || e.target.className==="close"){
    document.getElementById("animalModal").style.display = "none";
  }
}

function releaseAnimal(){
  if(!currentAnimal) return;
  logged = logged.filter(a => a.name !== currentAnimal.name);
  localStorage.setItem("wilddex_logged", JSON.stringify(logged));
  currentAnimal = null;
  closeModal();
  renderCollection();
  updateBadges();
}
</script>
</body>
</html>
